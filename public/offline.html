<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hireoven Offline</title>
    <style>
      :root {
        color-scheme: light;
        --brand: #0369a1;
        --brand-dark: #0c4a6e;
        --ink: #0f172a;
        --muted: #64748b;
        --surface: #ffffff;
        --line: #d7e6f3;
        --bg: linear-gradient(180deg, #f0f9ff 0%, #f8fafc 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 32px;
        padding: 32px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        font-weight: 700;
        color: var(--brand);
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(32px, 5vw, 44px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.7;
        color: var(--muted);
      }

      .meta {
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: #e0f2fe;
        color: var(--brand-dark);
        font-weight: 600;
      }

      a {
        display: inline-block;
        margin-top: 28px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--brand);
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Hireoven Offline</div>
      <h1>You're offline</h1>
      <p>Check your connection to see the latest jobs.</p>
      <div class="meta" id="cached-count" hidden>Cached jobs: <span id="cached-count-value">0</span></div>
      <a href="/dashboard">Try again</a>
    </main>
    <script>
      (async function () {
        try {
          const response = await fetch("/__offline__/jobs-count")
          if (!response.ok) return
          const data = await response.json()
          if (typeof data.count !== "number" || data.count <= 0) return
          document.getElementById("cached-count").hidden = false
          document.getElementById("cached-count-value").textContent = String(data.count)
        } catch {
          // No cached job count available.
        }
      })()
    </script>
  </body>
  </html>
